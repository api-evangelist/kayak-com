aid: kayak-com
name: KAYAK
description: >-
  KAYAK is a global travel meta-search engine headquartered in Stamford,
  Connecticut, owned by Booking Holdings (NASDAQ: BKNG). Founded in 2004 by
  Steve Hafner and Paul English, KAYAK aggregates results from hundreds of
  online travel agencies, airlines, hotel chains, car-rental companies, and
  cruise providers to help travelers compare prices for flights, hotels, cars,
  vacation packages, and cruises across a single interface. The company
  operates the KAYAK consumer brand, the HotelsCombined and Momondo
  meta-search brands, and KAYAK for Business, a corporate travel platform.
  KAYAK also runs a global Affiliate Network that lets publishers, content
  sites, and travel partners embed KAYAK search via co-branded search forms,
  iframes, deep links, and white-label search pages, with revenue share on
  redirected click traffic. KAYAK does not publish a self-serve public REST
  or GraphQL API for third-party developers; the consumer experience is
  delivered through its websites, native apps, voice integrations (Alexa,
  Google Assistant), and chat surfaces (Slack, Messenger). Programmatic
  access is limited to vetted partners under the KAYAK Affiliate Network and
  KAYAK Partner Network agreements, which typically expose XML/JSON feeds,
  deep-link builders, white-label search results pages, and conversion
  tracking — all gated behind a partner application process. There is no
  public OpenAPI specification, no published SDK, and no developer portal
  for KAYAK's underlying meta-search infrastructure.
